<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Naga Emas Terbang Mewah - Pusaka Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#05020f; font-family:'Cormorant Garamond', serif; touch-action:none;}
  #c { display:block; position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
  #ui {
    position:absolute; top:0; left:0; right:0; z-index:10; pointer-events:none;
    text-align:center; padding-top: 28px;
    color: #f9e6b5;
    text-shadow: 0 2px 30px rgba(255,180,60,0.35), 0 0 12px rgba(212,175,55,0.6);
  }
  #ui h1 {
    font-family:'Cinzel Decorative', serif;
    font-weight:900;
    font-size: clamp(22px, 5.4vw, 62px);
    letter-spacing: 0.06em;
    background: linear-gradient(180deg, #fff7d6 0%, #f8d270 22%, #d4a437 45%, #a66f1e 65%, #f5d06a 85%, #fff2c5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 4px 18px rgba(255,170,30,0.25));
    margin-bottom:4px;
  }
  #ui p.subtitle {
    font-size: clamp(11px,1.6vw,18px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color:#e9c97a;
    opacity:.92;
  }
  #ui p.desc {
    margin-top:8px;
    font-size: clamp(11px,1.15vw,15px);
    color:#d8bc82cc;
    letter-spacing: .03em;
    max-width: 620px;
    margin-left:auto; margin-right:auto;
    line-height:1.5; padding:0 14px;
  }
  .ornament { width:150px; height:18px; margin:10px auto 0 auto; opacity:.9; display:block; }
  .corner {
    position:absolute; z-index:5; pointer-events:none; opacity:.6;
    width:110px; height:110px;
  }
  .corner.tl { top:10px; left:12px; border-top:2px solid #d4af3755; border-left:2px solid #d4af3755; border-top-left-radius: 18px; }
  .corner.tr { top:10px; right:12px; border-top:2px solid #d4af3755; border-right:2px solid #d4af3755; border-top-right-radius: 18px; }
  .corner.bl { bottom:10px; left:12px; border-bottom:2px solid #d4af3755; border-left:2px solid #d4af3755; border-bottom-left-radius: 18px; }
  .corner.br { bottom:10px; right:12px; border-bottom:2px solid #d4af3755; border-right:2px solid #d4af3755; border-bottom-right-radius: 18px; }

  #footer {
    position:absolute; bottom:10px; width:100%; text-align:center; z-index:10;
    color:#c9a95f99; font-size:11px; letter-spacing:.1em;
    pointer-events:none; padding:0 12px;
  }
  #controls {
    position:absolute; bottom:18px; left:14px; z-index:30;
    color:#e5c87a; font-size:12.5px; letter-spacing:.04em;
    background: rgba(19,12,4,0.72);
    border:1px solid rgba(212,175,55,0.32);
    padding:12px 14px; border-radius:13px;
    line-height:1.6;
    box-shadow: 0 8px 30px rgba(0,0,0,.45);
    max-width: 300px;
    pointer-events:auto;
  }
  #controls b { color:#ffe6a3; }
  #controls button {
    background: linear-gradient(180deg,#f6d47a,#c9952e);
    border:none; color:#3a1f00; font-weight:700;
    padding:8px 13px; border-radius:9px; cursor:pointer; font-size:13px;
    margin:4px 4px 3px 0; letter-spacing:.02em;
    font-family: 'Cormorant Garamond', serif;
    touch-action: manipulation;
  }
  #controls button.secondary {
    background: rgba(255,225,140,0.10);
    color:#e9c97a;
    border:1px solid rgba(212,175,55,.38);
  }
  #errbox {
    position: fixed; top: 8px; left: 8px; right: 8px; z-index: 99;
    background: #b91c1c; color: #fff; font-family: monospace;
    font-size: 12px; padding: 8px 10px; border-radius: 8px;
    display:none; white-space:pre-wrap;
  }
  @media (max-width:720px){
    #controls{ left:10px; right:10px; bottom:44px; max-width:none; font-size:12px;}
    .corner{ width:66px; height:66px; }
    #ui{ padding-top:16px; }
    #footer{ bottom:8px; font-size:10px;}
  }
</style>
</head>
<body>
<div id="errbox"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="ui">
  <h1>NĀGA SUWARNADWIPA</h1>
  <p class="subtitle">Naga Emas Terbang Mewah</p>
  <svg class="ornament" viewBox="0 0 200 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M2 11 C40 2 60 20 100 11 C140 2 160 20 198 11" stroke="#d4af37" stroke-width="1.2" fill="none"/>
    <circle cx="100" cy="11" r="3.5" fill="#f5d06a" />
  </svg>
  <p class="desc">Penjaga langit Nusantara — sisik emas tempa Majapahit, bernafas api suci, menari di antara awan dan bintang.</p>
</div>

<canvas id="c"></canvas>

<div id="controls">
  <div><b>Naga Emas Pusaka</b><br>
  Gerakkan jari untuk menuntun naga<br>
  <span style="opacity:.82">Tap layar untuk sembur api</span></div>
  <div style="margin-top:7px">
    <button id="btnFire">SEMBUR API 🔥</button>
    <button id="btnMode" class="secondary">Mode Khidmat</button>
    <button id="btnTrail" class="secondary">Jejak: ON</button>
  </div>
</div>

<div id="footer">PUSAKA MEDIA • Belajar-coding • © 2025 Nusantara Digital Heritage</div>

<script>
(function(){
var errbox = document.getElementById('errbox');
function showErr(m){ errbox.style.display='block'; errbox.textContent = 'Error: '+m; }
window.onerror = function(msg, src, line, col){ showErr(msg + ' @' + line + ':' + col); };

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d', {alpha:false});
if(!ctx){ showErr('Canvas 2d tidak didukung'); return; }

var W=0, H=0, DPR = Math.min(window.devicePixelRatio || 1, 1.75);
function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// Stars
var stars = [];
for(var i=0;i<160;i++){ stars.push({x:Math.random(), y:Math.random()*0.78, s:Math.random()*1.5+0.4, tw: Math.random()*6.28, sp: 0.015+Math.random()*0.02 });}

// Clouds
var clouds = [];
for(var i=0;i<7;i++){ clouds.push({ x: Math.random()*W, y: H*(0.2+Math.random()*0.5), r: 70+Math.random()*120, speed: 0.05+Math.random()*0.12, o: 0.045+Math.random()*0.07 });}

// Dragon state
var mouseX = W*0.6, mouseY = H*0.45;
var targetX = mouseX, targetY = mouseY;
var majesticMode = false, trailOn = true, firePower = 0;

function setTarget(cx, cy){ targetX = cx; targetY = cy; }
canvas.addEventListener('mousemove', function(e){ setTarget(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); var t=e.touches[0]; setTarget(t.clientX, t.clientY); burstFire(); }, {passive:false});
canvas.addEventListener('touchmove', function(e){ e.preventDefault(); var t=e.touches[0]; setTarget(t.clientX, t.clientY); }, {passive:false});
canvas.addEventListener('click', burstFire);

function burstFire(){ firePower = Math.min(firePower + 1.7, 3.3); }

document.getElementById('btnFire').addEventListener('click', function(e){ e.stopPropagation(); burstFire(); });
var btnMode = document.getElementById('btnMode');
btnMode.addEventListener('click', function(e){ e.stopPropagation(); majesticMode=!majesticMode; btnMode.textContent = majesticMode ? 'Mode Terbang' : 'Mode Khidmat'; });
var btnTrail = document.getElementById('btnTrail');
btnTrail.addEventListener('click', function(e){ e.stopPropagation(); trailOn=!trailOn; btnTrail.textContent = 'Jejak: ' + (trailOn ? 'ON' : 'OFF'); });

var embers = [], goldTrail = [];
var BODY_SEGMENTS = 28;
var body = [];
for(var i=0;i<BODY_SEGMENTS;i++){ body.push({x: -120 - i*22, y: H*0.45, a:0}); }
var head = {x: W*0.5, y: H*0.45, vx:0, vy:0, ang: -0.15};

var time = 0;
function lerp(a,b,t){ return a+(b-a)*t; }

function drawMountains(tms){
  ctx.fillStyle = '#0b1126';
  ctx.beginPath(); ctx.moveTo(0, H*0.78);
  for(var x=0;x<=W;x+=30){ var y = H*0.78 + Math.sin((x+tms*0.012)*0.008)*16; ctx.lineTo(x,y); }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#0e1735';
  ctx.beginPath(); ctx.moveTo(0, H*0.84);
  for(var x=0;x<=W;x+=24){ var y = H*0.84 + Math.sin((x+tms*0.02)*0.011)*19; ctx.lineTo(x,y); }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
}

function draw(){
  try{
  time += 16.666;
  var tSec = time/1000;

  mouseX = lerp(mouseX, targetX, 0.05);
  mouseY = lerp(mouseY, targetY, 0.05);

  // bg
  var bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, '#05010d'); bg.addColorStop(0.5, '#15103a'); bg.addColorStop(1, '#21184a');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // moon
  var moonX = W*0.82, moonY = H*0.19;
  ctx.save();
  ctx.shadowColor = '#ffe7a8'; ctx.shadowBlur = 36;
  ctx.fillStyle = '#fde5a2';
  ctx.beginPath(); ctx.arc(moonX, moonY, 38, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();

  // stars
  for(var i=0;i<stars.length;i++){
    var s = stars[i]; s.tw += s.sp;
    var alpha = 0.38 + Math.sin(s.tw)*0.32;
    ctx.fillStyle = 'rgba(255,236,185,'+alpha+')';
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.s, 0, Math.PI*2); ctx.fill();
  }

  // clouds
  for(var i=0;i<clouds.length;i++){
    var cl = clouds[i];
    cl.x -= cl.speed;
    if(cl.x < -cl.r*2) { cl.x = W + cl.r; cl.y = H*(0.18+Math.random()*0.55); }
    ctx.save(); ctx.globalAlpha = cl.o;
    ctx.fillStyle = 'rgba(200,190,240,0.35)';
    ctx.beginPath(); ctx.ellipse(cl.x, cl.y, cl.r, cl.r*0.52, 0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  drawMountains(time);

  // dragon movement
  var autoX = W*0.5 + Math.cos(tSec*0.31)*W*0.26;
  var autoY = H*0.44 + Math.sin(tSec*0.47)*H*0.13;
  var influence = majesticMode ? 0.28 : 0.55;
  var destX = autoX*(1-influence) + mouseX*influence;
  var destY = autoY*(1-influence) + mouseY*influence;

  var dx = destX - head.x, dy = destY - head.y;
  head.vx = head.vx*0.9 + dx*0.018;
  head.vy = head.vy*0.9 + dy*0.018;
  head.x += head.vx; head.y += head.vy;
  head.ang = Math.atan2(head.vy, head.vx);

  body[0].x = head.x; body[0].y = head.y; body[0].a = head.ang;
  for(var i=1;i<BODY_SEGMENTS;i++){
    var p = body[i-1], c = body[i];
    var followDist = 19 - Math.min(i*0.22, 7);
    var ang = Math.atan2(p.y - c.y, p.x - c.x);
    c.x = lerp(c.x, p.x - Math.cos(ang)*followDist, 0.45);
    c.y = lerp(c.y, p.y - Math.sin(ang)*followDist, 0.45);
    c.a = ang;
    c.y += Math.sin(tSec*3.4 + i*0.55) * (majesticMode?1.8:2.8) * Math.min(1, i/6);
  }

  // trail
  if(trailOn && (time % 32 < 16)){
    goldTrail.push({x: head.x, y: head.y, life: 60});
    if(goldTrail.length>140) goldTrail.shift();
  }
  for(var i=goldTrail.length-1;i>=0;i--){
    var gt = goldTrail[i]; gt.life -= 1.2;
    if(gt.life<=0){ goldTrail.splice(i,1); continue; }
    var al = gt.life/60;
    ctx.save(); ctx.globalAlpha = al*0.5;
    ctx.fillStyle = '#ffd66a'; ctx.shadowColor='#ffc443'; ctx.shadowBlur=7;
    ctx.beginPath(); ctx.arc(gt.x, gt.y, 1.4+al*2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // draw body tail->head
  var wingFlap = Math.sin(tSec * (majesticMode?3.6:5.4)) * (majesticMode?0.5:0.72);
  for(var i=BODY_SEGMENTS-1; i>=0; i--){
    var n = body[i];
    var ti = i / BODY_SEGMENTS;
    var segScale = 1 - ti*0.6;
    var radiusY = 15 * segScale + 3;
    var radiusX = 22 * segScale + 5;

    ctx.save(); ctx.translate(n.x, n.y); ctx.rotate(n.a);

    // body
    ctx.fillStyle = '#e3a523';
    ctx.beginPath();
    // ellipse fallback for old browsers
    if(ctx.ellipse){ ctx.ellipse(0,0, radiusX, radiusY, 0, 0, Math.PI*2); }
    else { ctx.arc(0,0, radiusY, 0, Math.PI*2); }
    ctx.fill();

    // belly shine
    ctx.fillStyle = 'rgba(255,243,193,0.55)';
    ctx.beginPath();
    if(ctx.ellipse){ ctx.ellipse(2, radiusY*0.28, radiusX*0.7, radiusY*0.45, 0,0,Math.PI*2); }
    else { ctx.arc(0, radiusY*0.2, radiusY*0.5,0,Math.PI*2); }
    ctx.fill();

    // dorsal spine
    if(i < BODY_SEGMENTS-3 && i % 2 === 0){
      ctx.fillStyle = '#ffefb8';
      ctx.beginPath();
      ctx.moveTo(-2, -radiusY);
      ctx.lineTo(0, -radiusY - 10);
      ctx.lineTo(2, -radiusY);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    // wings
    if(i===5 || i===6){
      var wSide = (i===5?1:-1);
      var wingOpen = wingFlap * wSide;
      ctx.save(); ctx.translate(n.x, n.y); ctx.rotate(n.a + wingOpen*0.22);
      ctx.fillStyle = '#ffc24b';
      ctx.strokeStyle = '#ffdf8a'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6,0);
      ctx.bezierCurveTo(30, -82*wSide, 110, -108*wSide, 155, -54*wSide);
      ctx.bezierCurveTo(120, -36*wSide, 70, -8*wSide, -4, 2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  }

  // HEAD
  ctx.save(); ctx.translate(head.x, head.y); ctx.rotate(head.ang);
  ctx.fillStyle = '#ffda6f';
  if(ctx.ellipse){ ctx.beginPath(); ctx.ellipse(12, -1, 34, 19, 0.06, 0, Math.PI*2); ctx.fill(); }
  else { ctx.beginPath(); ctx.arc(12,-1,20,0,Math.PI*2); ctx.fill(); }
  // eye
  ctx.fillStyle = '#ffca46';
  ctx.beginPath(); ctx.arc(4, -9, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0300';
  ctx.beginPath();
  if(ctx.ellipse){ ctx.ellipse(5, -9, 1.8, 4.8, -0.15, 0, Math.PI*2); }
  else { ctx.arc(5,-9,2.5,0,Math.PI*2); }
  ctx.fill();
  // horn
  ctx.strokeStyle = '#fff0c8'; ctx.lineWidth = 4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3,-15); ctx.quadraticCurveTo(10,-38, 6,-56); ctx.stroke();
  // whiskers
  ctx.strokeStyle = '#fff1c8'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(34,3); ctx.quadraticCurveTo(68,8, 112, 0);
  ctx.moveTo(32,8); ctx.quadraticCurveTo(60,18, 96, 14);
  ctx.stroke();
  // fangs
  ctx.fillStyle = '#fff9e9';
  ctx.beginPath(); ctx.moveTo(32,9); ctx.lineTo(35,19); ctx.lineTo(28,13); ctx.closePath(); ctx.fill();
  ctx.restore();

  // fire
  firePower *= 0.982;
  if(firePower > 0.08){
    var fireOriginX = head.x + Math.cos(head.ang)*46;
    var fireOriginY = head.y + Math.sin(head.ang)*46;
    for(var f=0; f< Math.ceil(firePower*4); f++){
      var speed = 5 + Math.random()*6 + firePower*2;
      var fdir = head.ang + (Math.random()-0.5)*0.14;
      embers.push({x:fireOriginX, y:fireOriginY, vx:Math.cos(fdir)*speed, vy:Math.sin(fdir)*speed, life:28+Math.random()*20, max: 40, col:1});
    }
    ctx.save(); ctx.translate(fireOriginX, fireOriginY); ctx.rotate(head.ang);
    var flameLen = 60 + firePower*48;
    var flg = ctx.createLinearGradient(0,0,flameLen,0);
    flg.addColorStop(0,'rgba(255,255,240,0.95)');
    flg.addColorStop(0.4,'rgba(255,130,22,0.7)');
    flg.addColorStop(1,'rgba(190,22,50,0)');
    ctx.fillStyle = flg;
    ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(flameLen, -3); ctx.lineTo(flameLen, 3); ctx.lineTo(0,12); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // embers
  for(var i=embers.length-1;i>=0;i--){
    var e = embers[i];
    e.x += e.vx; e.y += e.vy; e.vx *= 0.992; e.vy += e.col? -0.01 : 0.032;
    e.life--;
    if(e.life<=0){ embers.splice(i,1); continue; }
    var al = e.life / e.max;
    ctx.globalAlpha = al;
    ctx.fillStyle = e.col ? '#ff9d21' : '#ffcc5c';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.col? 2.2 : 1.3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  }catch(err){
    showErr(err.message);
    return;
  }
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
setInterval(function(){ if(firePower>0) firePower = Math.max(0, firePower-0.09); }, 60);

document.getElementById('c').addEventListener('contextmenu', function(e){ e.preventDefault(); });

})();
</script>
</body>
</html>
